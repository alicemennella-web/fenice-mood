<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fenice Mood Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐦‍🔥</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#eee;min-height:100vh;display:flex;justify-content:center;padding:1.5rem 1rem}
.app{width:100%;max-width:680px}
.app-title{font-size:22px;font-weight:500;color:#eee;text-align:center;margin-bottom:0.2rem}
.app-sub{font-size:13px;color:#888;text-align:center;margin-bottom:2rem;font-style:italic}
.phoenix-card{background:#1a1a1a;border:0.5px solid #333;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.phoenix-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.phoenix-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;background:#222}
.phoenix-name{font-size:16px;font-weight:500;color:#eee}
.phoenix-phase{font-size:12px;color:#888;margin-top:2px}
.bar-wrap{position:relative;height:36px;background:#222;border-radius:18px;overflow:hidden;border:0.5px solid #333;margin-bottom:0.5rem}
.bar-fill{position:absolute;left:0;top:0;height:100%;border-radius:18px;transition:width 0.7s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:flex-end;padding-right:10px;min-width:36px}
.bar-pct{font-size:11px;font-weight:500;color:rgba(255,255,255,0.9)}
.bar-labels{display:flex;justify-content:space-between;font-size:11px;color:#666;margin-bottom:0.75rem}
.bar-msg{font-size:13px;color:#888;font-style:italic;min-height:20px}
.divider{border:none;border-top:0.5px solid #333;margin:1.5rem 0}
.who-label{font-size:13px;color:#888;margin-bottom:0.5rem}
.who-toggle{display:flex;gap:8px;margin-bottom:1.5rem}
.who-btn{flex:1;padding:8px;border-radius:8px;border:0.5px solid #333;background:#1a1a1a;cursor:pointer;font-size:13px;color:#888;font-weight:400;transition:all 0.2s}
.mood-label{font-size:14px;font-weight:500;color:#eee;margin-bottom:0.75rem}
.mood-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mood-btn{background:#1a1a1a;border:0.5px solid #333;border-radius:8px;padding:12px 8px;cursor:pointer;text-align:center;transition:all 0.15s}
.mood-btn:hover{background:#222;border-color:#555;transform:translateY(-1px)}
.mood-btn:active{transform:scale(0.97)}
.mood-emoji{font-size:22px;display:block;margin-bottom:5px}
.mood-name{font-size:11px;color:#888;display:block;line-height:1.3}
.mood-delta{font-size:10px;font-weight:500;display:block;margin-top:3px}
.status-msg{font-size:12px;color:#666;text-align:center;margin-top:1rem;min-height:18px}
.refresh-btn{display:block;margin:0.75rem auto 0;font-size:12px;color:#888;background:none;border:0.5px solid #333;border-radius:8px;padding:5px 14px;cursor:pointer}
.refresh-btn:hover{color:#eee;border-color:#555}
.tarot-btn{display:block;width:100%;margin-top:1.5rem;padding:12px;border-radius:8px;border:1px solid #7F77DD;background:transparent;cursor:pointer;font-size:13px;color:#AFA9EC;transition:all 0.2s;text-align:center}
.tarot-btn:hover{background:#1a1a2e;color:#EEEDFE}
.tarot-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;padding:1rem}
.tarot-overlay.open{display:flex}
.tarot-modal{background:#1a1a1a;border:1px solid #534AB7;border-radius:12px;max-width:360px;width:100%;padding:2rem 1.5rem;text-align:center;position:relative}
.tarot-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:18px;cursor:pointer;color:#888}
.tarot-card-emoji{font-size:48px;margin-bottom:0.75rem;display:block}
.tarot-card-name{font-size:16px;font-weight:500;color:#eee;margin-bottom:0.25rem}
.tarot-card-sub{font-size:11px;color:#888;margin-bottom:1rem;font-style:italic}
.tarot-card-msg{font-size:13px;color:#bbb;line-height:1.6;margin-bottom:1.25rem}
.tarot-again{padding:8px 20px;border-radius:8px;border:1px solid #534AB7;background:transparent;cursor:pointer;font-size:12px;color:#AFA9EC}
.tarot-again:hover{background:#1a1a2e;color:#EEEDFE}
.tarot-flip{animation:flip 0.4s ease}
@keyframes flip{0%{transform:rotateY(90deg);opacity:0}100%{transform:rotateY(0);opacity:1}}
</style>
</head>
<body>
<div class="app">
  <div class="app-title">🐦‍🔥 Fenice Mood Tracker 🐦‍🔥</div>
  <div class="app-sub">perché le fenici rinasceranno</div>

  <div class="phoenix-card">
    <div class="phoenix-header">
      <div class="phoenix-avatar" id="av-f1">🥚</div>
      <div>
        <div class="phoenix-name">Vermy</div>
        <div class="phoenix-phase" id="phase-f1">—</div>
      </div>
    </div>
    <div class="bar-wrap">
      <div class="bar-fill" id="bar-f1" style="width:50%;background:#7F77DD"><span class="bar-pct" id="pct-f1">50%</span></div>
    </div>
    <div class="bar-labels"><span>💀 cenere</span><span>🐦‍🔥 gloria</span></div>
    <div class="bar-msg" id="msg-f1"></div>
  </div>

  <div class="phoenix-card">
    <div class="phoenix-header">
      <div class="phoenix-avatar" id="av-f2">🥚</div>
      <div>
        <div class="phoenix-name">Belcagna</div>
        <div class="phoenix-phase" id="phase-f2">—</div>
      </div>
    </div>
    <div class="bar-wrap">
      <div class="bar-fill" id="bar-f2" style="width:50%;background:#7F77DD"><span class="bar-pct" id="pct-f2">50%</span></div>
    </div>
    <div class="bar-labels"><span>💀 cenere</span><span>🐦‍🔥 gloria</span></div>
    <div class="bar-msg" id="msg-f2"></div>
  </div>

  <hr class="divider">

  <div class="who-label">stai aggiornando il mood di:</div>
  <div class="who-toggle">
    <button class="who-btn" id="btn-me" onclick="selectWho('fenice1')">Vermy</button>
    <button class="who-btn" id="btn-her" onclick="selectWho('fenice2')">Belcagna</button>
  </div>

  <div class="mood-label">com'è oggi?</div>
  <div class="mood-grid" id="mood-grid"></div>
  <div class="status-msg" id="status-msg"></div>
  <button class="refresh-btn" onclick="loadData()">↻ aggiorna barre</button>
  <button class="tarot-btn" onclick="openTarot()">🔮 necessito consiglio dal destino</button>
</div>

<div class="tarot-overlay" id="tarot-overlay" onclick="closeTarotOutside(event)">
  <div class="tarot-modal" id="tarot-modal">
    <button class="tarot-close" onclick="closeTarot()">✕</button>
    <span class="tarot-card-emoji" id="t-emoji"></span>
    <div class="tarot-card-name" id="t-name"></div>
    <div class="tarot-card-sub" id="t-sub"></div>
    <div class="tarot-card-msg" id="t-msg"></div>
    <button class="tarot-again" onclick="drawCard()">↻ un'altra carta</button>
  </div>
</div>

<script>
const BIN_ID='6a2e860cda38895dfebe2672';
const API_KEY='$2a$10$eyOvjG2U3yzDkc0inKq0eO5yWBcCyxt2uQfNu1mT1ECkrfNS5WGve';
const BASE_URL='https://api.jsonbin.io/v3/b/'+BIN_ID;

const STYLE_SELECTED='background:#2a2040;border:2px solid #7F77DD;color:#EEEDFE;font-weight:600';

const tarotDeck=[
  {emoji:'🌟',name:'Il Matto',sub:'Arcano 0',msg:"Il destino ti suggerisce di saltare nel vuoto. Con stile. Senza guardare giù. La fenice non chiede il permesso prima di rinascere."},
  {emoji:'🪄',name:'Il Mago',sub:'Arcano I',msg:"Hai tutti gli strumenti. Tutti. Li stai solo usando come posacenere. Forse è il momento di smettere."},
  {emoji:'🌙',name:'La Papessa',sub:'Arcano II',msg:"Il silenzio sa cose che tu non sai ancora. Siediti. Ascolta. O almeno smetti di fare cose inutili per un secondo."},
  {emoji:'👑',name:"L'Imperatrice",sub:'Arcano III',msg:"Abbondanza in arrivo. Non chiedere quando — il destino non ha agenda. Ma sta arrivando. Probabilmente."},
  {emoji:'🏛️',name:"L'Imperatore",sub:'Arcano IV',msg:"È ora di mettere ordine. Nel cassetto dei calzini, nella vita, nell'anima. Inizia dal cassetto."},
  {emoji:'✨',name:'Il Papa',sub:'Arcano V',msg:"Qualcuno ha la risposta che cerchi. Potrebbe essere un'amica. Potrebbe essere la fenice. Probabile che tu lo sappia già."},
  {emoji:'💘',name:"Gli Amanti",sub:'Arcano VI',msg:"Una scelta si avvicina. Il cuore sa già. Il cervello sta ancora compilando un foglio Excel di pro e contro."},
  {emoji:'🏆',name:'Il Carro',sub:'Arcano VII',msg:"Vittoria imminente. Tieniti forte perché arriva veloce e i cavalli non frenano per nessuno."},
  {emoji:'⚖️',name:'La Giustizia',sub:'Arcano VIII',msg:"L'universo sta tenendo il conto. Non di te — stai bene. Di qualcun altro. Rilassati."},
  {emoji:'🏮',name:"L'Eremita",sub:'Arcano IX',msg:"La risposta è dentro di te. Lo sapevi. Stavi solo sperando che il destino ti dicesse qualcosa di più utile."},
  {emoji:'🎡',name:'La Ruota della Fortuna',sub:'Arcano X',msg:"Tutto cambia. Sempre. Anche questa cosa che ti sembra immobile. Specialmente questa cosa."},
  {emoji:'🦁',name:'La Forza',sub:'Arcano XI',msg:"Ce la fai. Sì, anche quella cosa lì. Ce la fai. La fenice non ha alternative e nemmeno tu."},
  {emoji:'🙃',name:"L'Appeso",sub:'Arcano XII',msg:"Capovolgiti. Non metaforicamente — anche metaforicamente. Cambia prospettiva. Forse il problema non esiste dall'altro lato."},
  {emoji:'💀',name:'La Morte',sub:'Arcano XIII',msg:"Niente panico. Non è letterale. È solo la fine di qualcosa di vecchio. Come la fenice. Sai già come va a finire."},
  {emoji:'🌊',name:'La Temperanza',sub:'Arcano XIV',msg:"Piano. Respira. Mescola lentamente. Il risultato sarà migliore se smetti di agitare tutto freneticamente."},
  {emoji:'😈',name:'Il Diavolo',sub:'Arcano XV',msg:"Quella cosa che pensi sia una trappola? Probabilmente lo è. Ma sei tu che tieni la chiave. Da sempre."},
  {emoji:'⚡',name:'La Torre',sub:'Arcano XVI',msg:"Qualcosa sta per crollare. Era già marcio. Il crollo è il favore, non il problema."},
  {emoji:'🌠',name:'La Stella',sub:'Arcano XVII',msg:"Speranza confermata. Il cielo sta dalla tua parte. Almeno per oggi. Goditi questo momento."},
  {emoji:'🌕',name:'La Luna',sub:'Arcano XVIII',msg:"Le cose non sono come sembrano. Specialmente di notte. Specialmente quella cosa lì. Aspetta l'alba."},
  {emoji:'☀️',name:'Il Sole',sub:'Arcano XIX',msg:"Gioia in arrivo. Pura, semplice, imbarazzante nella sua ovvietà. Lasciala entrare senza fare domande."},
  {emoji:'📯',name:'Il Giudizio',sub:'Arcano XX',msg:"È ora di chiudere i conti. Con il passato, con quella situazione, con quella versione di te che non ti serviva più."},
  {emoji:'🌍',name:'Il Mondo',sub:'Arcano XXI',msg:"Ce l'hai fatta. O stai per farcela. O farcela è la direzione giusta. In ogni caso: brava. Sul serio."},
];

const moods=[
  {emoji:'💀',name:"Solo cenere. Nient'altro che cenere.",delta:-20},
  {emoji:'🌋',name:'Silent scream',delta:-10},
  {emoji:'🥚',name:'Esisto, boh',delta:-5},
  {emoji:'🌡️',name:'Le ceneri fremono. Forse.',delta:5},
  {emoji:'🔥',name:'Sto bruciando',delta:10},
  {emoji:'🐦‍🔥',name:'Rinata e invincibile',delta:20},
];

const msgPool={
  neg:["Piantino. Neanche la fenice si riprende da questo.","Sto bruciando, ma nel senso sbagliato.","Presenza rilevata. Entusiasmo: assente."],
  pos:["Le fiamme crescono.","GLORIA. FULGORE. NIENTE PIANTINO OGGI.","Segnali di vita. Cauti ottimismi."]
};

const phases=[
  {max:15, label:'💀 cenere totale. rip.',                emoji:'💀',color:'#444441'},
  {max:30, label:'🪨 brace spenta. ma ancora brace.',     emoji:'🪨',color:'#5F5E5A'},
  {max:45, label:"🥚 c'è vita. poca, ma c'è.",            emoji:'🥚',color:'#534AB7'},
  {max:60, label:'🐣 la fenice esiste. non è entusiasta.',emoji:'🐣',color:'#7F77DD'},
  {max:75, label:'🔥 le fiamme crescono. finalmente.',    emoji:'🔥',color:'#993C1D'},
  {max:90, label:'🐦‍🔥 in gloria. per ora.',               emoji:'🐦‍🔥',color:'#D85A30'},
  {max:101,label:'✨ invincibile. eterna. inarrestabile.',emoji:'✨',color:'#EF9F27'},
];

function getPhase(v){return phases.find(p=>v<p.max)||phases[phases.length-1];}
function clamp(v){return Math.max(0,Math.min(100,Math.round(v)));}

let currentWho='fenice1';
let data={fenice1:50,fenice2:50};
let lastMsg={fenice1:'',fenice2:''};

function updateUI(){
  ['fenice1','fenice2'].forEach((k,i)=>{
    const s=i===0?'f1':'f2';
    const v=clamp(data[k]);
    const p=getPhase(v);
    document.getElementById('bar-'+s).style.width=v+'%';
    document.getElementById('bar-'+s).style.background=p.color;
    document.getElementById('pct-'+s).textContent=v+'%';
    document.getElementById('phase-'+s).textContent=p.label;
    document.getElementById('av-'+s).textContent=p.emoji;
    if(lastMsg[k])document.getElementById('msg-'+s).textContent=lastMsg[k];
  });
}

function selectWho(who){
  currentWho=who;
  const me=document.getElementById('btn-me');
  const her=document.getElementById('btn-her');
  me.removeAttribute('style');
  her.removeAttribute('style');
  if(who==='fenice1') me.style.cssText=STYLE_SELECTED;
  else her.style.cssText=STYLE_SELECTED;
}

async function applyMood(delta){
  data[currentWho]=clamp(data[currentWho]+delta);
  const pool=delta<0?msgPool.neg:msgPool.pos;
  lastMsg[currentWho]=pool[Math.floor(Math.random()*pool.length)];
  updateUI();
  setStatus('salvando...');
  try{
    await fetch(BASE_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify({fenice1:data.fenice1,fenice2:data.fenice2})});
    setStatus('salvato ✓');
  }catch(e){setStatus('salvato in locale');}
  setTimeout(()=>setStatus(''),2500);
}

async function loadData(){
  setStatus('aggiornando...');
  try{
    const r=await fetch(BASE_URL+'/latest',{headers:{'X-Master-Key':API_KEY}});
    if(!r.ok)throw new Error('http '+r.status);
    const j=await r.json();
    const rec=j.record||{};
    if(typeof rec.fenice1==='number')data.fenice1=clamp(rec.fenice1);
    if(typeof rec.fenice2==='number')data.fenice2=clamp(rec.fenice2);
    setStatus('aggiornato ✓');
  }catch(e){setStatus('offline — lavoro in locale');}
  updateUI();
  setTimeout(()=>setStatus(''),2500);
}

function setStatus(m){document.getElementById('status-msg').textContent=m;}

function openTarot(){document.getElementById('tarot-overlay').classList.add('open');drawCard();}
function closeTarot(){document.getElementById('tarot-overlay').classList.remove('open');}
function closeTarotOutside(e){if(e.target===document.getElementById('tarot-overlay'))closeTarot();}

function drawCard(){
  const card=tarotDeck[Math.floor(Math.random()*tarotDeck.length)];
  document.getElementById('t-emoji').textContent=card.emoji;
  document.getElementById('t-name').textContent=card.name;
  document.getElementById('t-sub').textContent=card.sub;
  document.getElementById('t-msg').textContent=card.msg;
  const m=document.getElementById('tarot-modal');
  m.classList.remove('tarot-flip');
  void m.offsetWidth;
  m.classList.add('tarot-flip');
}

function buildMoods(){
  const g=document.getElementById('mood-grid');
  moods.forEach(m=>{
    const btn=document.createElement('button');
    btn.className='mood-btn';
    const sign=m.delta>0?'+':'';
    const dc=m.delta>0?'#3B6D11':m.delta<0?'#A32D2D':'#666';
    btn.innerHTML=`<span class="mood-emoji">${m.emoji}</span><span class="mood-name">${m.name}</span><span class="mood-delta" style="color:${dc}">${sign}${m.delta}%</span>`;
    btn.onclick=()=>applyMood(m.delta);
    g.appendChild(btn);
  });
}

buildMoods();
selectWho('fenice1');
updateUI();
loadData();
</script>
</body>
</html>
```
